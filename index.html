<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>OXYSTEC</title>

<style>
.topo {
    width: 100%;
    border-bottom: 1px solid #0ff;
    text-align: center;
    padding: 10px 0;
}

.logo-img {
    width: 100%;
    max-height: 120px;
    object-fit: contain;
    display: block;
    margin: 0 auto;
}
body {
    margin: 0;
    font-family: Arial;
    background: #000;
    color: #0ff;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    border-bottom: 1px solid #0ff;
}

.logo {
    display: flex;
    align-items: center;
}

.logo img {
    width: 40px;
    margin-right: 10px;
}

.logo h1 {
    margin: 0;
    text-shadow: 0 0 10px #0ff;
}

/* MENU */
.menu {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 15px 0;
}

.categoria {
    padding: 10px 20px;
    border: 2px solid #0ff;
    border-radius: 50px;
    color: #0ff;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
    box-shadow: 0 0 10px #0ff;
}

.categoria:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 20px #0ff;
    background: #0ff;
    color: black;
}
/* TITULO */
.section-title {
    text-align: center;
    margin-top: 40px;
    text-shadow: 0 0 10px #0ff;
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 25px;
    padding: 20px;
}

/* CARD */
.card {
    background: #0a0a0a;
    border: 1px solid #0ff;
    border-radius: 12px;
    padding: 15px;
    text-align: center;
    box-shadow: 0 0 10px #0ff33a;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 20px #0ff;
}

/* IMAGEM */
.card img {
    width: 100%;
    height: 200px;
    object-fit: contain;
    background: #000;
    border-radius: 8px;
    padding: 10px;
}

/* TEXTO */
.card h3 {
    margin-top: 10px;
}

/* BOTÃO */
.botao {
    display: inline-block;
    margin-top: 10px;
    padding: 10px 15px;
    background: #0ff;
    color: #000;
    text-decoration: none;
    border-radius: 6px;
    font-weight: bold;
    box-shadow: 0 0 10px #0ff;
}

.botao:hover {
    background: #00cccc;
}
.rodape {
    margin-top: 50px;
    padding: 20px;
    border-top: 1px solid #0ff;
    text-align: center;
}

.rodape img {
    width: 40px;
    margin: 0 10px;
    filter: drop-shadow(0 0 5px #0ff);
    transition: 0.3s;
}

.rodape img:hover {
    transform: scale(1.2);
    filter: drop-shadow(0 0 10px #0ff);
}    
</style>
</head>

<body>

<header class="topo">
    <img src="logooxystec.png" class="logo-img">
</header>

<div class="menu">
    <a href="#canivetes" class="categoria">Canivetes</a>
    <a href="#facas" class="categoria">Facas</a>
    <a href="#outdoor" class="categoria">Outdoor</a>
</div>
</header>

<h2 class="section-title" id="canivetes">Canivetes Táticos</h2>
<div class="container">

    <div class="card">
        <img src="canivete todo preto oxystec.webp">
        <h3>Canivete SOG Terminus XR</h3>
        <a class="botao" href="https://www.mercadolivre.com.br/canivete-tatico-sog-terminus-xr-limited-cryo-d2-g10-clip/p/MLBU3754082639" target="_blank">
            Ver no Mercado Livre
        </a>
    </div>

    <div class="card">
        <img src="D_NQ_NP_2X_911581-MLB108501067641_032026-F.webp">
        <h3>Canivete Kershaw 2200</h3>
        <a class="botao" href="https://www.mercadolivre.com.br/canivete-tatico-kershaw-2200-aco-8cr13mov-titanio-clip/p/MLBU3763394472" target="_blank">
            Ver no Mercado Livre
        </a>
    </div>

    <div class="card">
        <img src="canivete marrom desert oxystec.webp">
        <h3>Canivete CRKT Crawford Kasper</h3>
        <a class="botao" href="https://www.mercadolivre.com.br/canivete-crkt-tatico-crawford-kasper-desert-clip/p/MLBU3783950926" target="_blank">
            Ver no Mercado Livre
        </a>
    </div>

</div>

<h2 class="section-title" id="facas">Facas Táticas</h2>
<div class="container">

    <div class="card">
        <img src="faca tática oxystec.webp">
        <h3>Faca Kershaw Camp 5</h3>
        <a class="botao" href="https://www.mercadolivre.com.br/faca-tatica-kershaw-camp-5-bowie-aco-d2-full-tang-cabo-nylon/p/MLBU3838393658" target="_blank">
            Ver no Mercado Livre
        </a>
    </div>

</div>
<footer class="rodape">
    <a href="https://instagram.com/oxystec" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
    </a>

    <a href="https://mercadolivre.com.br/pagina/oxystec" target="_blank">
        <img src="https://http2.mlstatic.com/frontend-assets/ui-navigation/5.18.9/mercadolibre/logo__large_plus.png">
    </a>

    <a href="#" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/5968/5968898.png">
    </a>
</footer>
</body>
</html>
