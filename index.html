<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Outdoor Tech Store</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: black;
    color: #0ff;
}

header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 40px;
    border-bottom: 1px solid #0ff;
}

.logo {
    display: flex;
    align-items: center;
}

.logo img {
    width: 40px;
    margin-right: 10px;
}

.logo h1 {
    margin: 0;
    text-shadow: 0 0 10px #0ff;
}

.menu a {
    color: #0ff;
    margin-left: 20px;
    text-decoration: none;
    font-weight: bold;
}

.menu a:hover {
    text-shadow: 0 0 10px #0ff;
}

.section-title {
    text-align: center;
    margin-top: 40px;
    text-shadow: 0 0 10px #0ff;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: #111;
    border: 1px solid #0ff;
    border-radius: 10px;
    padding: 15px;
    text-align: center;
}

.card img {
    width: 100%;
    height: auto;
    border-radius: 8px;
    
}

.botao {
    display: inline-block;
    margin-top: 10px;
    padding: 10px;
    background: #0ff;
    color: black;
    text-decoration: none;
    border-radius: 5px;
    font-weight: bold;
}
</style>
</head>

<body>

<header>
    <div class="logo">
        <img src="colesualogoaqui">
        <h1>OXYSTEC</h1>
    </div>

    <div class="menu">
        <a href="#canivetes">Canivetes</a>
        <a href="#facas">Facas</a>
        <a href="#outdoor">Outdoor</a>
    </div>
</header>

<div class="container">

    <div class="card">
        <img src="IMAGEM">
        <h3>Canivete SOG Terminus XR</h3>
        <a class="botao" href="https://www.mercadolivre.com.br/canivete-tatico-sog-terminus-xr-limited-cryo-d2-g10-clip/p/MLBU3754082639" target="_blank">
            Ver no Mercado Livre
        </a>
    </div>

    <div class="card">
        <img src="D_NQ_NP_2X_911581-MLB108501067641_032026-F.webp">
        <h3>Canivete Kershaw 2200</h3>
        <a class="botao" href="https://www.mercadolivre.com.br/canivete-tatico-kershaw-2200-aco-8cr13mov-titanio-clip/p/MLBU3763394472" target="_blank">
            Ver no Mercado Livre
        </a>
    </div>

    <div class="card">
        <img src="IMAGEM">
        <h3>Canivete CRKT Crawford Kasper</h3>
        <a class="botao" href="https://www.mercadolivre.com.br/canivete-crkt-tatico-crawford-kasper-desert-clip/p/MLBU3783950926" target="_blank">
            Ver no Mercado Livre
        </a>
    </div>

</div>

<h2 class="section-title" id="facas">Facas Táticas</h2>
<div class="container">

    <div class="card">
        <img src="IMAGEM">
        <h3>Faca Kershaw Camp 5</h3>

</div>

</body>
</html>
